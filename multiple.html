<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8" />
    <title>Ally.Studio — 3D Name Tag Preview</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
    <style>
        :root {
            --bg: #faf5ff;
            --surface: rgba(255,255,255,0.92);
            --surface-solid: #ffffff;
            --border: rgba(200,170,230,0.3);
            --border-strong: rgba(180,150,220,0.4);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --accent-soft: rgba(168,85,247,0.08);
            --accent-glow: rgba(168,85,247,0.2);
            --accent2: #ec4899;
            --accent2-soft: rgba(236,72,153,0.08);
            --text: #1e1b2e;
            --text-secondary: #6b5b8a;
            --text-muted: #b8a8d0;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --shadow: 0 2px 12px rgba(120,80,180,0.06);
            --shadow-lg: 0 8px 32px rgba(120,80,180,0.1);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Nunito', 'Noto Sans Thai Looped', system-ui, sans-serif;
            background: linear-gradient(160deg, #faf5ff 0%, #fdf2f8 40%, #f0e6ff 100%);
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            flex-shrink: 0;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 11px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 15px;
            font-weight: 900;
            box-shadow: 0 4px 16px rgba(168,85,247,0.25);
        }
        .brand-name {
            font-size: 18px;
            font-weight: 900;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
        }
        .brand-tag {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .topbar-sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ===== NAME INPUT ===== */
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .ctrl-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .ctrl-label i {
            color: var(--accent);
            margin-right: 3px;
            font-size: 11px;
        }

        .input-text {
            width: 160px;
            padding: 9px 14px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            background: var(--surface-solid);
            color: var(--text);
            font-family: inherit;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input-text:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            outline: none;
        }
        .input-text::placeholder { color: var(--text-muted); font-weight: 500; }

        #msg {
            font-size: 11px;
            color: var(--accent2);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ===== FONT BAR ===== */
        .font-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 99;
            overflow: hidden;
        }
        .font-bar-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .font-bar-label i {
            color: var(--accent);
            margin-right: 3px;
        }
        .font-scroll {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 2px 0;
            flex: 1;
        }
        .font-scroll::-webkit-scrollbar { height: 3px; }
        .font-scroll::-webkit-scrollbar-track { background: transparent; }
        .font-scroll::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.15); border-radius: 10px; }

        .font-chip {
            padding: 7px 11px;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            background: var(--surface-solid);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .font-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }
        .font-chip.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: #fff;
            box-shadow: 0 3px 12px var(--accent-glow);
        }
        .font-chip.loading {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== VIEWPORT ===== */
        .viewport {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        #view {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(180deg, #faf5ff 0%, #f5eeff 50%, #fdf2f8 100%);
            touch-action: none;
        }

        /* View control buttons */
        .view-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
            z-index: 50;
        }
        .view-btn {
            width: 34px; height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            background: var(--surface);
            backdrop-filter: blur(16px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 12px;
        }
        .view-btn:hover {
            background: var(--surface-solid);
            box-shadow: var(--shadow);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ===== NOTICE BAR ===== */
        .notice {
            flex-shrink: 0;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(236,72,153,0.06));
            border-top: 1px solid var(--border);
            text-align: center;
            z-index: 100;
        }
        .notice p {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .notice .notice-icon {
            color: var(--accent2);
            margin-right: 4px;
        }

        /* ===== WATERMARK OVERLAY ===== */
        .watermark-overlay {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 40;
        }
        .watermark-overlay svg {
            width: 100%;
            height: 100%;
        }

        /* ===== MOBILE (< 640px) ===== */
        @media (max-width: 640px) {
            .topbar {
                padding: 10px 14px;
                gap: 10px;
            }
            .brand-logo { width: 32px; height: 32px; font-size: 13px; border-radius: 9px; }
            .brand-name { font-size: 16px; }
            .brand-tag { font-size: 9px; }
            .topbar-sep { display: none; }
            .input-text { width: 120px; padding: 8px 10px; font-size: 13px; }
            .ctrl-label { font-size: 11px; }

            .font-bar { padding: 6px 14px; gap: 6px; }
            .font-chip { padding: 6px 9px; font-size: 10px; border-width: 1.5px; border-radius: 8px; }

            .view-controls { top: 8px; right: 8px; }
            .view-btn { width: 30px; height: 30px; font-size: 11px; border-radius: 8px; }

            .notice { padding: 8px 14px; }
            .notice p { font-size: 11px; }
        }

        /* ===== TABLET (641-860px) ===== */
        @media (min-width: 641px) and (max-width: 860px) {
            .topbar { padding: 12px 16px; }
            .input-text { width: 140px; }
        }
    </style>
</head>

<body>
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <div class="brand-logo"><i class="fa fa-star"></i></div>
            <div>
                <div class="brand-name">Ally.Studio</div>
                <div class="brand-tag">3D Name Tag Preview</div>
            </div>
        </div>
        <div class="topbar-sep"></div>
        <div class="ctrl-group">
            <span class="ctrl-label"><i class="fa fa-pen-nib"></i> Name</span>
            <input type="text" id="text" class="input-text" placeholder="พิมพ์ชื่อที่ต้องการ" value="Ranchana" />
        </div>
        <span id="msg"></span>
    </div>

    <!-- FONT BAR -->
    <div class="font-bar">
        <span class="font-bar-label"><i class="fa fa-heart"></i> Font</span>
        <div class="font-scroll" id="fontGrid"></div>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport">
        <canvas id="view"></canvas>
        <div class="view-controls">
            <button class="view-btn" data-view="front" title="Front"><i class="fa fa-arrow-up"></i></button>
            <button class="view-btn" data-view="top" title="Top"><i class="fa fa-circle-dot"></i></button>
            <button class="view-btn" data-view="side" title="Side"><i class="fa fa-arrow-right"></i></button>
        </div>
        <div class="watermark-overlay" id="watermarkOverlay"></div>
    </div>

    <!-- NOTICE -->
    <div class="notice">
        <p><i class="fa fa-info-circle notice-icon"></i>ภาพนี้เป็นตัวอย่างคร่าวๆ นะคะ ทางร้านจะปรับความหนาและระยะห่างตัวอักษรให้สวยอีกทีก่อนผลิตค่ะ ไม่ต้องห่วงเลย~</p>
    </div>

    <script type="module" src="./preview-app.js"></script>
</body>
</html>
