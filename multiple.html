<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8" />
    <title>Ally.Studio — 3D Name Tag Preview</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
    <style>
        :root {
            --bg: #faf5ff;
            --surface: rgba(255,255,255,0.92);
            --surface-solid: #ffffff;
            --border: rgba(200,170,230,0.3);
            --border-strong: rgba(180,150,220,0.4);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --accent-soft: rgba(168,85,247,0.08);
            --accent-glow: rgba(168,85,247,0.2);
            --accent2: #ec4899;
            --accent2-soft: rgba(236,72,153,0.08);
            --text: #1e1b2e;
            --text-secondary: #6b5b8a;
            --text-muted: #b8a8d0;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --shadow: 0 2px 12px rgba(120,80,180,0.06);
            --shadow-lg: 0 8px 32px rgba(120,80,180,0.1);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Nunito', 'Noto Sans Thai Looped', system-ui, sans-serif;
            background: linear-gradient(160deg, #faf5ff 0%, #fdf2f8 40%, #f0e6ff 100%);
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            flex-shrink: 0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .brand-logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            box-shadow: 0 4px 16px rgba(168,85,247,0.25);
        }
        .brand-name {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
        }
        .brand-tag {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .topbar-sep {
            width: 1px;
            height: 32px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ===== CONTROLS ROW ===== */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
        }
        .controls::-webkit-scrollbar { height: 0; }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .ctrl-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .ctrl-label i {
            color: var(--accent);
            margin-right: 3px;
            font-size: 11px;
        }

        .input-text {
            width: 180px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            background: var(--surface-solid);
            color: var(--text);
            font-family: inherit;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input-text:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            outline: none;
        }
        .input-text::placeholder { color: var(--text-muted); font-weight: 500; }

        /* Font chips in topbar */
        .font-scroll {
            display: flex;
            gap: 5px;
            max-width: 420px;
            overflow-x: auto;
            padding: 2px;
        }
        .font-scroll::-webkit-scrollbar { height: 4px; }
        .font-scroll::-webkit-scrollbar-track { background: transparent; }
        .font-scroll::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.15); border-radius: 10px; }

        .font-chip {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            background: var(--surface-solid);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .font-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
        }
        .font-chip.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: #fff;
            box-shadow: 0 3px 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Preview button */
        .btn-preview {
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 800;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-xs);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            color: #fff;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            transition: all var(--transition);
            letter-spacing: 0.01em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-preview:hover {
            box-shadow: 0 4px 20px var(--accent-glow), 0 4px 16px rgba(236,72,153,0.2);
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .btn-preview:active { transform: translateY(0); box-shadow: none; }
        .btn-preview:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; filter: none; }
        .btn-preview i { font-size: 12px; }

        #msg {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ===== VIEWPORT ===== */
        .viewport {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        #view {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(180deg, #faf5ff 0%, #f5eeff 50%, #fdf2f8 100%);
        }

        /* View control buttons */
        .view-controls {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            gap: 4px;
            z-index: 50;
        }
        .view-btn {
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            background: var(--surface);
            backdrop-filter: blur(16px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 12px;
        }
        .view-btn:hover {
            background: var(--surface-solid);
            box-shadow: var(--shadow);
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* ===== WATERMARK OVERLAY ===== */
        .watermark-overlay {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 40;
        }
        .watermark-overlay svg {
            width: 100%;
            height: 100%;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 860px) {
            .topbar {
                flex-wrap: wrap;
                padding: 12px 16px;
                gap: 10px;
            }
            .topbar-sep { display: none; }
            .controls {
                flex-wrap: wrap;
                gap: 8px;
            }
            .input-text { width: 140px; }
            .font-scroll { max-width: 100%; }
        }
    </style>
</head>

<body>
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <div class="brand-logo"><i class="fa fa-star"></i></div>
            <div>
                <div class="brand-name">Ally.Studio</div>
                <div class="brand-tag">3D Name Tag Preview</div>
            </div>
        </div>
        <div class="topbar-sep"></div>
        <div class="controls">
            <div class="ctrl-group">
                <span class="ctrl-label"><i class="fa fa-pen-nib"></i> Name</span>
                <input type="text" id="text" class="input-text" placeholder="Enter your name" value="Ranchana" />
            </div>
            <div class="ctrl-group">
                <span class="ctrl-label"><i class="fa fa-heart"></i> Font</span>
                <div class="font-scroll" id="fontGrid"></div>
            </div>
            <button id="preview" class="btn-preview">
                <i class="fa fa-sparkles"></i> Preview
            </button>
            <span id="msg"></span>
        </div>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport">
        <canvas id="view"></canvas>
        <div class="view-controls">
            <button class="view-btn" data-view="front" title="Front"><i class="fa fa-arrow-up"></i></button>
            <button class="view-btn" data-view="top" title="Top"><i class="fa fa-circle-dot"></i></button>
            <button class="view-btn" data-view="side" title="Side"><i class="fa fa-arrow-right"></i></button>
        </div>
        <!-- Watermark overlay -->
        <div class="watermark-overlay" id="watermarkOverlay"></div>
    </div>

    <script type="module" src="./preview-app.js"></script>
</body>
</html>
