<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8" />
    <title>3D Name Tag Preview</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
    <style>
        :root {
            --bg: #fdf2f8;
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #f0e6ff 70%, #ede9fe 100%);
            --surface: rgba(255,255,255,0.85);
            --surface-solid: #ffffff;
            --border: rgba(236,182,210,0.35);
            --border-strong: rgba(219,149,186,0.45);
            --accent: #e879a8;
            --accent-hover: #db5c91;
            --accent-soft: rgba(232,121,168,0.10);
            --accent-glow: rgba(232,121,168,0.25);
            --accent2: #a78bfa;
            --accent2-soft: rgba(167,139,250,0.10);
            --text: #4a2040;
            --text-secondary: #8b5e7e;
            --text-muted: #c4a0b8;
            --canvas-bg: linear-gradient(160deg, #fef7fb 0%, #f5f0ff 50%, #fdf2f8 100%);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --shadow: 0 4px 20px rgba(180,100,140,0.08);
            --shadow-lg: 0 12px 44px rgba(180,100,140,0.12);
            --shadow-glow: 0 4px 20px rgba(232,121,168,0.20);
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Nunito', 'Noto Sans Thai Looped', system-ui, sans-serif;
            background: var(--bg-gradient);
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
            overflow: hidden;
        }

        /* === Full-screen 3D canvas === */
        .viewport {
            position: relative;
            grid-column: 1;
            grid-row: 1;
        }
        #view {
            width: 100%;
            height: 100%;
            display: block;
            background: #fef7fb;
        }

        /* === Floating panel === */
        .panel {
            position: fixed;
            top: 50%;
            left: 24px;
            transform: translateY(-50%);
            width: 330px;
            background: var(--surface);
            backdrop-filter: blur(28px) saturate(1.8);
            -webkit-backdrop-filter: blur(28px) saturate(1.8);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.6) inset;
            z-index: 100;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 48px);
            overflow: hidden;
        }

        /* Panel header */
        .panel-head {
            padding: 22px 24px 16px;
            text-align: center;
        }
        .panel-emoji {
            font-size: 28px;
            margin-bottom: 4px;
            display: block;
        }
        .panel-head h1 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .panel-head p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 20px;
        }

        /* Panel body */
        .panel-body {
            padding: 18px 22px 22px;
            overflow-y: auto;
            flex: 1;
        }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: rgba(200,150,170,0.2); border-radius: 10px; }

        /* Field */
        .field { margin-bottom: 16px; }
        .field:last-child { margin-bottom: 0; }
        .field-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 7px;
        }
        .field-label i {
            font-size: 11px;
            color: var(--accent);
        }

        /* Text input */
        .input-text {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface-solid);
            color: var(--text);
            font-family: inherit;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input-text:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            outline: none;
        }
        .input-text::placeholder { color: var(--text-muted); font-weight: 500; }

        /* Font grid */
        .font-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .font-chip {
            padding: 10px 0;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            background: var(--surface-solid);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
        }
        .font-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px var(--accent-glow);
        }
        .font-chip.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, #f472b6, #c084fc);
            color: #fff;
            box-shadow: 0 4px 14px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Font scroll */
        .font-scroll {
            max-height: 195px;
            overflow-y: auto;
            border-radius: var(--radius-sm);
            padding: 2px;
        }
        .font-scroll::-webkit-scrollbar { width: 4px; }
        .font-scroll::-webkit-scrollbar-track { background: transparent; }
        .font-scroll::-webkit-scrollbar-thumb { background: rgba(200,150,170,0.25); border-radius: 10px; }

        /* Preview button */
        .btn-preview {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            transition: all var(--transition);
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
            margin-top: 18px;
        }
        .btn-preview:hover {
            box-shadow: var(--shadow-glow), 0 6px 24px rgba(192,132,252,0.25);
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .btn-preview:active { transform: translateY(0); box-shadow: none; }
        .btn-preview:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; filter: none; }
        .btn-preview i { font-size: 13px; }

        /* Status */
        #msg {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 8px 0 0;
            min-height: 20px;
            font-weight: 500;
        }

        /* === Viewport controls === */
        .view-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
            z-index: 50;
        }
        .view-btn {
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 13px;
        }
        .view-btn:hover {
            background: var(--surface-solid);
            box-shadow: var(--shadow);
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0.4;
            pointer-events: none;
            z-index: 50;
        }

        /* === Responsive === */
        @media (max-width: 860px) {
            .panel {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                transform: none;
                border-radius: 24px 24px 0 0;
                max-height: 55vh;
            }
        }
    </style>
</head>

<body>
    <div class="viewport">
        <canvas id="view"></canvas>
        <div class="view-controls">
            <button class="view-btn" data-view="front" title="Front"><i class="fa fa-arrow-up"></i></button>
            <button class="view-btn" data-view="top" title="Top"><i class="fa fa-circle-dot"></i></button>
            <button class="view-btn" data-view="side" title="Side"><i class="fa fa-arrow-right"></i></button>
        </div>
        <div class="watermark">3D Name Tag Preview</div>
    </div>

    <div class="panel">
        <div class="panel-head">
            <span class="panel-emoji">&#x2728;</span>
            <h1>Name Tag Preview</h1>
            <p>Preview your custom 3D name tag</p>
        </div>
        <div class="divider"></div>
        <div class="panel-body">
            <div class="field">
                <label class="field-label"><i class="fa fa-pen-nib"></i> Name</label>
                <input type="text" id="text" class="input-text" placeholder="Enter your name" value="Ranchana" />
            </div>
            <div class="field">
                <label class="field-label"><i class="fa fa-heart"></i> Font</label>
                <div class="font-scroll">
                    <div class="font-grid" id="fontGrid"></div>
                </div>
            </div>
            <button id="preview" class="btn-preview">
                <i class="fa fa-sparkles"></i> Preview
            </button>
            <div id="msg"></div>
        </div>
    </div>

    <script type="module" src="./preview-app.js"></script>
</body>
</html>
